<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4f8;--s1:#ffffff;--s2:#f8fafc;--s3:#eef2f7;
  --border:#dde3ec;--border2:#c8d1de;
  --accent:#2563eb;--purple:#7c3aed;
  --green:#16a34a;--red:#dc2626;--yellow:#d97706;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow2:0 4px 12px rgba(0,0,0,.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

.hdr{position:sticky;top:0;z-index:50;background:var(--s1);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--shadow);}
.hdr-brand{display:flex;align-items:center;gap:8px;}
.live-ring{width:9px;height:9px;border-radius:50%;background:var(--green);
  box-shadow:0 0 0 2px rgba(22,163,74,.2);animation:liveRing 2s infinite;}
@keyframes liveRing{0%,100%{box-shadow:0 0 0 2px rgba(22,163,74,.2)}50%{box-shadow:0 0 0 5px rgba(22,163,74,.05)}}
.hdr h1{font-size:14px;font-weight:700;color:var(--text);}
.conn-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;
  background:var(--s2);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text2);}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--red);}
.conn-dot.on{background:var(--green);}

.body{padding:12px;display:flex;flex-direction:column;gap:10px;max-width:460px;margin:0 auto;}

.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;box-shadow:var(--shadow);}
.card-head{display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;border-bottom:1px solid var(--border);background:var(--s2);}
.card-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.card-body{padding:13px 14px;}
.caller-card{border-top:3px solid var(--accent);}

.phone-big{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--accent);
  letter-spacing:.03em;min-height:34px;}
.phone-big.empty{color:var(--text3);font-size:15px;font-weight:400;font-family:var(--sans);}

.field-input{background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:9px 11px;color:var(--text);font-family:var(--sans);font-size:13px;
  outline:none;transition:border-color .15s,box-shadow .15s;width:100%;}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.field-input::placeholder{color:var(--text3);}
.field-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text3);margin-bottom:5px;}

.manual-row{display:flex;gap:6px;margin-top:10px;}
.manual-row .field-input{flex:1;}
.btn-paste{padding:0 13px;background:var(--s2);border:1px solid var(--border);border-radius:8px;
  color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500;}
.btn-paste:hover{border-color:var(--accent);color:var(--accent);background:#eff6ff;}

textarea{background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:10px 11px;color:var(--text);font-family:var(--sans);font-size:13px;
  line-height:1.5;resize:vertical;min-height:70px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;}
textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.1);}
textarea::placeholder{color:var(--text3);}

.banks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.bank-btn{padding:7px 5px;background:var(--s2);border:1px solid var(--border);border-radius:7px;
  color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;text-align:center;
  transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.bank-btn:hover{border-color:var(--purple);background:#f5f3ff;color:var(--purple);}
.bank-btn.sel{background:#f5f3ff;border-color:var(--purple);color:var(--purple);font-weight:700;}
.bank-btn.sel::before{content:'✓ ';}
.sel-display{margin-top:8px;min-height:18px;font-size:11px;color:var(--purple);font-weight:600;line-height:1.5;}

.send-btn{width:100%;padding:14px;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .2s,transform .1s,box-shadow .2s;
  box-shadow:0 4px 14px rgba(37,99,235,.3);}
.send-btn:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.35);}
.send-btn:active{transform:translateY(0);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:900;
  align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.show{display:flex;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.inc-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;
  padding:30px 26px;width:350px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.15);animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.inc-ring{font-size:42px;margin-bottom:16px;display:inline-block;animation:ringAnim .6s infinite alternate;}
@keyframes ringAnim{from{transform:rotate(-12deg)}to{transform:rotate(12deg)}}
.inc-from{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500;}
.inc-name{font-size:22px;font-weight:700;margin-bottom:5px;color:var(--text);}
.inc-phone{font-family:var(--mono);font-size:18px;color:var(--accent);margin-bottom:10px;font-weight:600;}
.inc-banks{font-size:12px;color:var(--purple);margin-bottom:8px;font-weight:600;}
.inc-note{font-size:12px;color:var(--text2);font-style:italic;margin-bottom:12px;
  background:var(--s2);padding:10px 13px;border-radius:9px;border:1px solid var(--border);
  text-align:left;line-height:1.5;}
.call-hint{font-size:10px;color:var(--text3);margin-bottom:18px;padding:7px 11px;
  background:var(--s2);border-radius:7px;border:1px solid var(--border);line-height:1.5;}
.inc-actions{display:flex;gap:10px;}
.btn-call{flex:1;padding:13px 8px;background:var(--green);color:#fff;border:none;
  border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;
  box-shadow:0 4px 12px rgba(22,163,74,.3);}
.btn-call:hover{opacity:.88;}
.btn-decline{flex:1;padding:13px 8px;background:var(--s2);color:var(--text2);
  border:1px solid var(--border);border-radius:10px;font-size:13px;cursor:pointer;transition:all .15s;font-weight:500;}
.btn-decline:hover{border-color:var(--red);color:var(--red);background:#fef2f2;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);
  background:var(--green);color:#fff;padding:10px 20px;border-radius:9px;
  font-size:12px;font-weight:600;z-index:9999;transition:transform .3s;white-space:nowrap;
  pointer-events:none;box-shadow:var(--shadow2);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);}
.toast.warn{background:var(--yellow);}

.tag{font-size:9px;padding:3px 8px;border-radius:10px;border:1px solid;font-weight:700;letter-spacing:.06em;}
.tag-auto{border-color:var(--green);color:var(--green);background:rgba(22,163,74,.08);}
.tag-manual{border-color:var(--yellow);color:var(--yellow);background:rgba(217,119,6,.08);}
.div{height:1px;background:var(--border);margin:2px 0;}

/* BİLDİRİM GEÇMİŞİ */
.notif-list{display:flex;flex-direction:column;gap:8px;}
.notif-item{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;
  display:flex;flex-direction:column;gap:5px;transition:border-color .15s;}
.notif-item:hover{border-color:var(--accent);}
.notif-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.notif-phone{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--accent);}
.notif-name{font-size:13px;font-weight:600;color:var(--text);}
.notif-from{font-size:10px;color:var(--text3);}
.notif-banks{font-size:11px;color:var(--purple);font-weight:600;}
.notif-note{font-size:11px;color:var(--text2);font-style:italic;}
.notif-actions{display:flex;gap:6px;margin-top:4px;}
.notif-call{padding:5px 12px;background:var(--green);color:#fff;border:none;border-radius:6px;
  font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.notif-call:hover{opacity:.85;}
.notif-time{font-size:10px;color:var(--text3);white-space:nowrap;}
.notif-empty{font-size:12px;color:var(--text3);text-align:center;padding:16px 0;}

/* MESAJ & DOSYA BÖLÜMÜ */
.msg-area{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:9px 11px;color:var(--text);font-family:var(--sans);font-size:13px;
  line-height:1.5;resize:none;min-height:70px;outline:none;transition:border-color .15s;}
.msg-area:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.msg-area::placeholder{color:var(--text3);}
.msg-toolbar{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
.msg-files{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.msg-file-item{display:flex;align-items:center;gap:5px;padding:4px 8px;
  background:var(--s2);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--text2);}
.msg-file-item button{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;padding:0;}
.btn-file{padding:6px 12px;background:var(--s2);border:1px solid var(--border);border-radius:7px;
  color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.btn-file:hover{border-color:var(--accent);color:var(--accent);background:#eff6ff;}
.btn-send-msg{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;
  font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s;margin-left:auto;}
.btn-send-msg:hover{opacity:.85;}
.btn-send-msg:disabled{opacity:.5;cursor:not-allowed;}
.msg-preview{max-width:100%;max-height:120px;border-radius:6px;border:1px solid var(--border);margin-top:4px;}
</style>
</head>
<body>

<div class="overlay" id="incomingOverlay">
  <div class="inc-card">
    <div class="inc-ring">📞</div>
    <div class="inc-from" id="incFrom">Ekipten yönlendirme</div>
    <div class="inc-name" id="incName">—</div>
    <div class="inc-phone" id="incPhone">—</div>
    <div class="inc-banks" id="incBanks"></div>
    <div class="inc-note" id="incNote">Not yok</div>
    <div class="call-hint">📲 "Müşteriyi Ara" tıkladığında Escow/MicroSIP açılır — aramayı siz başlatırsınız</div>
    <div class="inc-actions">
      <button class="btn-call" onclick="handleCall()">📲 Müşteriyi Ara</button>
      <button class="btn-decline" onclick="closeIncoming()">✕ Vazgeç</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="hdr">
  <div class="hdr-brand">
    <div class="live-ring"></div>
    <h1>CRM Panel</h1>
  </div>
  <div class="conn-pill">
    <div class="conn-dot" id="connDot"></div>
    <span id="connTxt">Bağlanıyor</span>
  </div>
</div>

<div class="body">

  <div class="card caller-card">
    <div class="card-head">
      <span class="card-label">📞 Aranan Müşteri</span>
      <span class="tag tag-manual" id="srcTag">Bekleniyor</span>
    </div>
    <div class="card-body">
      <div id="phoneDisplay" class="phone-big empty">Bekleniyor...</div>
      <div class="manual-row">
        <input class="field-input" id="manualPhone" placeholder="Telefon numarasını yapıştırın..."
          oninput="onManualPhone(this.value)" onkeydown="if(event.key==='Enter')applyManual()"/>
        <button class="btn-paste" onclick="pasteClipboard()">📋 Yapıştır</button>
      </div>
      <div style="margin-top:10px;">
        <div class="field-label">Ad Soyad</div>
        <input class="field-input" id="nameInput" placeholder="Otomatik gelir veya buraya yazın"/>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><span class="card-label">📝 Not</span></div>
    <div class="card-body">
      <textarea id="noteInput" placeholder="Müşteri hakkında not ekleyin..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><span class="card-label">🏦 Banka Seçin</span></div>
    <div class="card-body">
      <div class="banks-grid" id="banksGrid"></div>
      <div class="sel-display" id="selDisplay"></div>
    </div>
  </div>

  <div class="div"></div>
  <button class="send-btn" id="sendBtn" onclick="sendToTeam()">📤 Ekibe Gönder</button>

  <!-- MESAJ & DOSYA BÖLÜMÜ -->
  <div class="card">
    <div class="card-head">
      <span class="card-label">💬 Mesaj & Dosya Gönder</span>
    </div>
    <div class="card-body">
      <textarea class="msg-area" id="msgArea" placeholder="Ekibe mesaj yazın..."></textarea>
      <div class="msg-files" id="msgFiles"></div>
      <div class="msg-toolbar">
        <button class="btn-file" onclick="document.getElementById('fileInput').click()">📎 Dosya</button>
        <button class="btn-file" onclick="document.getElementById('photoInput').click()">📷 Fotoğraf</button>
        <input type="file" id="fileInput" style="display:none" onchange="addFiles(this.files)" multiple/>
        <input type="file" id="photoInput" style="display:none" accept="image/*" onchange="addFiles(this.files)" multiple/>
        <button class="btn-send-msg" id="sendMsgBtn" onclick="sendMessage()">📤 Gönder</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <span class="card-label">🔔 Gelen Bildirimler</span>
      <span style="font-size:10px;color:var(--text3);cursor:pointer;" onclick="clearNotifs()">Temizle</span>
    </div>
    <div class="card-body">
      <div class="notif-list" id="notifList">
        <div class="notif-empty">Henüz bildirim yok</div>
      </div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://dxxmrtrsossnuwunctwn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_BlmcEWtLhWb4a-whlX1j1w_2RRLsSxI';

const BANKS = [
  'Ziraat Bankası','İş Bankası','Garanti BBVA','Yapı Kredi','Akbank',
  'Halkbank','VakıfBank','DenizBank','QNB Finansbank','TEB',
  'İNG Bank','HSBC Turkey','Şekerbank','Fibabanka','Burgan Bank',
  'Türkiye Finans','Kuveyt Türk','Ziraat Katılım','Vakıf Katılım','Halk Katılım',
  'Odeabank','Alternatif Bank','Anadolubank','ICBC Turkey','Bank of China TR'
];

// Kullanıcı adı — URL'den veya otomatik bilgisayar adından al
let userId = localStorage.getItem('crm_uid') || ('kullanici_' + Math.random().toString(36).slice(2,6));
let userName = localStorage.getItem('crm_name') || userId;
localStorage.setItem('crm_uid', userId);
localStorage.setItem('crm_name', userName);

let currentPhone='', incPhone='', lastId=null, pollInterval=null;
let selectedBanks=new Set();

window.addEventListener('DOMContentLoaded', ()=>{
  buildBanks();
  parseUrlParams();
  startPolling();
});

function buildBanks(){
  const g=document.getElementById('banksGrid');
  BANKS.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='bank-btn';btn.textContent=b;btn.title=b;
    btn.onclick=()=>{
      if(selectedBanks.has(b)){selectedBanks.delete(b);btn.classList.remove('sel');}
      else{selectedBanks.add(b);btn.classList.add('sel');}
      document.getElementById('selDisplay').textContent=selectedBanks.size?'✓ '+[...selectedBanks].join(' · '):'';
    };
    g.appendChild(btn);
  });
}

function parseUrlParams(){
  const p=new URLSearchParams(window.location.search);
  const phone=p.get('phone')||'', name=p.get('name')||'';
  if(phone) setPhone(phone,name,'auto');
}

function setPhone(phone,name,src){
  currentPhone=phone;
  const el=document.getElementById('phoneDisplay');
  if(phone){el.textContent=phone;el.className='phone-big';document.title='📞 '+phone;}
  else{el.textContent='Bekleniyor...';el.className='phone-big empty';document.title='CRM Panel';}
  if(name) document.getElementById('nameInput').value=name;
  document.getElementById('manualPhone').value=phone||'';
  const tag=document.getElementById('srcTag');
  tag.className=src==='auto'?'tag tag-auto':'tag tag-manual';
  tag.textContent=src==='auto'?'Otomatik':'Manuel';
}

window.onManualPhone=(v)=>{
  let c=v.replace(/[\s\-\(\)]/g,'');
  // +90 otomatik ekle
  if(c && !c.startsWith('+') && !c.startsWith('0090')){
    if(c.startsWith('90') && c.length===12) c='+'+c;
    else if(c.startsWith('5') && c.length===10) c='+90'+c;
    else if(c.startsWith('0') && c.length===11) c='+90'+c.slice(1);
  }
  if(/^[\d\+]{7,}$/.test(c)){
    setPhone(c,'','manuel');
    // Input kutusunu da guncelle
    const inp=document.getElementById('manualPhone');
    if(inp && inp.value !== c) inp.value=c;
  }
};
window.applyManual=()=>{
  const v=document.getElementById('manualPhone').value.trim().replace(/[\s\-\(\)]/g,'');
  if(v) setPhone(v,'','manuel');
};
window.pasteClipboard=async()=>{
  try{
    const t=await navigator.clipboard.readText();
    document.getElementById('manualPhone').value=t;
    onManualPhone(t);
    showToast('Yapıştırıldı');
  }catch(e){showToast('Pano izni gerekli','warn');}
};

async function startPolling(){
  await checkNotifications();
  pollInterval=setInterval(checkNotifications,3000);
}

async function checkNotifications(){
  try{
    const res=await fetch(
      `${SUPABASE_URL}/rest/v1/crm_broadcast?order=id.desc&limit=1`,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}
    );
    if(!res.ok) return;
    const rows=await res.json();
    document.getElementById('connDot').classList.add('on');
    document.getElementById('connTxt').textContent='Bağlı';
    if(!rows.length) return;
    const row=rows[0];
    if(lastId===null){lastId=row.id;return;}
    if(row.id===lastId) return;
    if(row.from_id===userId){lastId=row.id;return;}
    const age=Date.now()-new Date(row.created_at).getTime();
    if(age>30000){lastId=row.id;return;}
    lastId=row.id;
    showIncoming(row);
  }catch(e){
    document.getElementById('connDot').classList.remove('on');
    document.getElementById('connTxt').textContent='Bağlanamadı';
  }
}

window.sendToTeam=async()=>{
  if(!currentPhone){showToast('Önce telefon numarası girin','err');return;}
  const payload={
    from_name: userName,
    from_id: userId,
    phone: currentPhone,
    name: document.getElementById('nameInput').value.trim()||currentPhone,
    banks: JSON.stringify([...selectedBanks]),
    note: document.getElementById('noteInput').value.trim()
  };
  const btn=document.getElementById('sendBtn');
  btn.disabled=true;btn.textContent='⏳ Gönderiliyor...';
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/crm_broadcast`,{
      method:'POST',
      headers:{
        'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,
        'Content-Type':'application/json','Prefer':'return=minimal'
      },
      body:JSON.stringify(payload)
    });
    if(res.ok) showToast('✅ Ekibe gönderildi!');
    else showToast('Hata: '+res.status,'err');
  }catch(e){showToast('Bağlantı hatası','err');}
  btn.disabled=false;btn.innerHTML='📤 Ekibe Gönder';
};

// Bildirim geçmişi
let notifHistory = [];

function formatNote(note) {
  if(!note) return '';
  // Imgur linklerini tıklanabilir yap
  return note.replace(/(https?:\/\/i\.imgur\.com\/\S+)/g, 
    '<a href="$1" target="_blank" style="color:var(--accent)">🖼 Resmi Gör</a>'
  ).replace(/
/g, '<br>');
}

window.clearNotifs = () => {
  notifHistory = [];
  document.getElementById('notifList').innerHTML = '<div class="notif-empty">Henüz bildirim yok</div>';
};

function addToHistory(d) {
  let banks = []; try { banks = JSON.parse(d.banks||'[]'); } catch(e) {}
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const phone = d.phone || '';
  
  const item = document.createElement('div');
  item.className = 'notif-item';
  item.innerHTML = `
    <div class="notif-top">
      <div>
        <div class="notif-name">${d.name||'—'}</div>
        <div class="notif-phone">${phone}</div>
      </div>
      <div style="text-align:right">
        <div class="notif-time">${time}</div>
        <div class="notif-from">${d.from_name||'Ekip'}</div>
      </div>
    </div>
    ${banks.length ? `<div class="notif-banks">🏦 ${banks.join(' · ')}</div>` : ''}
    ${d.note ? `<div class="notif-note">${formatNote(d.note)}</div>` : ''}
    <div class="notif-actions">
      <button class="notif-call" onclick="window.location.href='tel:${phone}'">📲 Ara</button>
    </div>
  `;
  
  const list = document.getElementById('notifList');
  const empty = list.querySelector('.notif-empty');
  if (empty) empty.remove();
  list.insertBefore(item, list.firstChild);
  
  // Max 20 bildirim tut
  while (list.children.length > 20) list.removeChild(list.lastChild);
}

function showIncoming(d){
  incPhone=d.phone||'';
  document.getElementById('incFrom').textContent=(d.from_name||'Ekip')+' yönlendirdi';
  document.getElementById('incName').textContent=d.name||'—';
  document.getElementById('incPhone').textContent=d.phone||'—';
  let banks=[];try{banks=JSON.parse(d.banks||'[]');}catch(e){}
  document.getElementById('incBanks').textContent=banks.length?'🏦 '+banks.join(' · '):'';
  document.getElementById('incNote').textContent=d.note||'Not yok';
  document.getElementById('incomingOverlay').classList.add('show');
  addToHistory(d);
  try{
    const ctx=new AudioContext();
    [0,.35,.7].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=880;
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(.3,ctx.currentTime+t+.05);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.3);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.35);
    });
  }catch(e){}
}

window.handleCall=()=>{
  if(!incPhone) return;
  window.location.href='tel:'+incPhone;
  closeIncoming();
};
window.closeIncoming=()=>{
  document.getElementById('incomingOverlay').classList.remove('show');
  incPhone='';
};

let toastTimer;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className='toast',3000);
}

// URL polling (XML izleyiciden gelen güncellemeler)
let lastTs='';
setInterval(()=>{
  const p=new URLSearchParams(window.location.search);
  const ts=p.get('ts')||'';
  if(ts!==lastTs){lastTs=ts;parseUrlParams();}
},800);

// ── MESAJ & DOSYA ──
let attachedFiles = [];

window.addFiles = (files) => {
  const container = document.getElementById('msgFiles');
  Array.from(files).forEach(file => {
    attachedFiles.push(file);
    const item = document.createElement('div');
    item.className = 'msg-file-item';
    item.dataset.idx = attachedFiles.length - 1;
    
    if(file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = e => {
        item.innerHTML = `<img src="${e.target.result}" class="msg-preview"/><span>${file.name}</span><button onclick="removeFile(this)">✕</button>`;
      };
      reader.readAsDataURL(file);
    } else {
      item.innerHTML = `<span>📎 ${file.name}</span><button onclick="removeFile(this)">✕</button>`;
    }
    container.appendChild(item);
  });
};

window.removeFile = (btn) => {
  const item = btn.closest('.msg-file-item');
  const idx = parseInt(item.dataset.idx);
  attachedFiles[idx] = null;
  item.remove();
};

// Resmi Imgur'a yükle
async function uploadToImgur(file) {
  const base64 = await new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result.split(',')[1]);
    r.readAsDataURL(file);
  });
  const resp = await fetch('https://api.imgur.com/3/image', {
    method: 'POST',
    headers: { 'Authorization': 'Client-ID 546c25a59c58ad7' },
    body: JSON.stringify({ image: base64, type: 'base64' }),
  });
  const data = await resp.json();
  if(data.success) return data.data.link;
  throw new Error('Imgur hatası');
}

window.sendMessage = async () => {
  const msg = document.getElementById('msgArea').value.trim();
  const files = attachedFiles.filter(f => f !== null);
  
  if(!msg && files.length === 0) { showToast('Mesaj veya dosya ekleyin','err'); return; }
  if(!userId) { showToast('Kullanıcı gerekli','err'); return; }

  const btn = document.getElementById('sendMsgBtn');
  btn.disabled = true; btn.textContent = '⏳ Yükleniyor...';

  // Resimleri Imgur'a yükle
  let fileLinks = [];
  for(const file of files) {
    try {
      if(file.type.startsWith('image/')) {
        showToast('Resim yükleniyor...');
        const link = await uploadToImgur(file);
        fileLinks.push('🖼 ' + file.name + ': ' + link);
      } else {
        fileLinks.push('📎 ' + file.name + ' (dosya)');
      }
    } catch(e) {
      fileLinks.push('❌ ' + file.name + ' yüklenemedi');
    }
  }

  const fullNote = [msg, ...fileLinks].filter(Boolean).join('
');

  const payload = {
    from_name: userName,
    from_id: userId,
    phone: currentPhone || '',
    name: document.getElementById('nameInput').value.trim() || '',
    banks: JSON.stringify([]),
    note: fullNote,
    msg_type: 'message'
  };

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/crm_broadcast`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json', 'Prefer': 'return=minimal'
      },
      body: JSON.stringify(payload)
    });
    if(res.ok) {
      showToast('✅ Mesaj gönderildi!');
      document.getElementById('msgArea').value = '';
      document.getElementById('msgFiles').innerHTML = '';
      attachedFiles = [];
    } else {
      showToast('Hata: ' + res.status, 'err');
    }
  } catch(e) { showToast('Bağlantı hatası','err'); }

  btn.disabled = false; btn.textContent = '📤 Gönder';
};
</script>
