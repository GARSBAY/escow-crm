<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Panel</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0d16;--s1:#111422;--s2:#171b2e;--s3:#1d2238;
  --border:#252b42;--border2:#2f3654;
  --accent:#3b8bff;--purple:#7c5cfc;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --text:#dde3f0;--text2:#8b95b0;--text3:#525d7a;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.hdr{position:sticky;top:0;z-index:50;background:var(--s1);border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
.hdr-brand{display:flex;align-items:center;gap:8px;}
.live-ring{width:9px;height:9px;border-radius:50%;background:var(--green);
  box-shadow:0 0 0 2px rgba(34,197,94,.25);animation:liveRing 2s infinite;}
@keyframes liveRing{0%,100%{box-shadow:0 0 0 2px rgba(34,197,94,.25)}50%{box-shadow:0 0 0 5px rgba(34,197,94,.05)}}
.hdr h1{font-size:13px;font-weight:600;letter-spacing:.06em;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.conn-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;
  background:var(--s2);border:1px solid var(--border);border-radius:20px;font-size:10px;color:var(--text2);}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--red);}
.conn-dot.on{background:var(--green);}
.user-btn{padding:3px 10px;background:var(--s2);border:1px solid var(--border);border-radius:20px;
  font-size:11px;color:var(--text2);cursor:pointer;}
.body{padding:12px;display:flex;flex-direction:column;gap:10px;max-width:460px;margin:0 auto;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.card-head{display:flex;align-items:center;justify-content:space-between;
  padding:8px 13px;border-bottom:1px solid var(--border);background:var(--s2);}
.card-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);}
.card-body{padding:12px 13px;}
.caller-card{border-left:2px solid var(--accent);}
.phone-big{font-family:var(--mono);font-size:24px;font-weight:600;color:var(--accent);letter-spacing:.04em;min-height:32px;}
.phone-big.empty{color:var(--text3);font-size:15px;font-weight:400;font-family:var(--sans);}
.field-input{background:var(--s3);border:1px solid var(--border);border-radius:7px;
  padding:8px 10px;color:var(--text);font-family:var(--sans);font-size:13px;
  outline:none;transition:border-color .15s;width:100%;}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--text3);}
.field-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
.manual-row{display:flex;gap:6px;margin-top:10px;}
.manual-row .field-input{flex:1;}
.btn-paste{padding:0 12px;background:var(--s3);border:1px solid var(--border);border-radius:7px;
  color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-paste:hover{border-color:var(--accent);color:var(--accent);}
textarea{background:var(--s3);border:1px solid var(--border);border-radius:7px;
  padding:9px 10px;color:var(--text);font-family:var(--sans);font-size:13px;
  line-height:1.5;resize:vertical;min-height:65px;width:100%;outline:none;transition:border-color .15s;}
textarea:focus{border-color:var(--purple);}
textarea::placeholder{color:var(--text3);}
.banks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.bank-btn{padding:6px 4px;background:var(--s3);border:1px solid var(--border);border-radius:6px;
  color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;text-align:center;
  transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.bank-btn:hover{border-color:var(--purple);background:var(--s2);color:var(--text);}
.bank-btn.sel{background:rgba(124,92,252,.15);border-color:var(--purple);color:#c4b5fd;font-weight:600;}
.bank-btn.sel::before{content:'✓ ';}
.sel-display{margin-top:8px;min-height:18px;font-size:11px;color:#c4b5fd;font-weight:500;line-height:1.4;}
.send-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--purple));
  color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .2s,transform .1s;box-shadow:0 4px 20px rgba(59,139,255,.2);}
.send-btn:hover{opacity:.9;transform:translateY(-1px);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:900;
  align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.overlay.show{display:flex;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.inc-card{background:var(--s1);border:1px solid var(--accent);border-radius:16px;
  padding:28px 24px;width:340px;text-align:center;
  box-shadow:0 0 50px rgba(59,139,255,.15);animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.inc-ring{font-size:40px;margin-bottom:16px;display:inline-block;animation:ringAnim .6s infinite alternate;}
@keyframes ringAnim{from{transform:rotate(-12deg)}to{transform:rotate(12deg)}}
.inc-from{font-size:11px;color:var(--text3);margin-bottom:6px;}
.inc-name{font-size:20px;font-weight:700;margin-bottom:4px;}
.inc-phone{font-family:var(--mono);font-size:18px;color:var(--accent);margin-bottom:8px;}
.inc-banks{font-size:12px;color:#c4b5fd;margin-bottom:6px;font-weight:500;}
.inc-note{font-size:12px;color:var(--text2);font-style:italic;margin-bottom:12px;
  background:var(--s2);padding:8px 12px;border-radius:8px;border:1px solid var(--border);text-align:left;line-height:1.5;}
.call-hint{font-size:10px;color:var(--text3);margin-bottom:16px;padding:6px 10px;
  background:var(--s2);border-radius:6px;border:1px solid var(--border);line-height:1.5;}
.inc-actions{display:flex;gap:10px;}
.btn-call{flex:1;padding:12px 8px;background:var(--green);color:#fff;border:none;
  border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn-call:hover{opacity:.85;}
.btn-decline{flex:1;padding:12px 8px;background:var(--s2);color:var(--text2);
  border:1px solid var(--border);border-radius:9px;font-size:13px;cursor:pointer;transition:all .15s;}
.btn-decline:hover{border-color:var(--red);color:var(--red);}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;align-items:center;justify-content:center;}
.modal-wrap.show{display:flex;}
.modal-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:28px;width:320px;}
.modal-card h2{font-size:18px;margin-bottom:6px;}
.modal-card p{font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
.modal-input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:7px;
  padding:10px 12px;color:var(--text);font-size:13px;outline:none;margin-bottom:10px;transition:border-color .15s;}
.modal-input:focus{border-color:var(--accent);}
.modal-input::placeholder{color:var(--text3);}
.modal-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;
  border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--green);color:#fff;padding:9px 18px;border-radius:8px;
  font-size:12px;font-weight:600;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);}
.toast.warn{background:var(--yellow);color:#000;}
.tag{font-size:9px;padding:2px 7px;border-radius:10px;border:1px solid;font-weight:600;letter-spacing:.06em;}
.tag-auto{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.08);}
.tag-manual{border-color:var(--yellow);color:var(--yellow);background:rgba(245,158,11,.08);}
.div{height:1px;background:var(--border);}
</style>
</head>
<body>

<div class="modal-wrap show" id="setupModal">
  <div class="modal-card">
    <h2>👤 Kullanıcı Kurulumu</h2>
    <p>Ekip bildirimlerini alabilmek için adınızı ve benzersiz bir ID girin.</p>
    <input class="modal-input" id="setupName" placeholder="Ad Soyad (örn: Ahmet Yılmaz)"/>
    <input class="modal-input" id="setupId" placeholder="Kullanıcı ID — boşluksuz (örn: ahmet1)"/>
    <button class="modal-btn" onclick="setupUser()">Başla →</button>
  </div>
</div>

<div class="overlay" id="incomingOverlay">
  <div class="inc-card">
    <div class="inc-ring">📞</div>
    <div class="inc-from" id="incFrom">Ekipten yönlendirme</div>
    <div class="inc-name" id="incName">—</div>
    <div class="inc-phone" id="incPhone">—</div>
    <div class="inc-banks" id="incBanks"></div>
    <div class="inc-note" id="incNote">Not yok</div>
    <div class="call-hint">📲 Butona basınca MicroSIP açılır — aramayı siz başlatırsınız</div>
    <div class="inc-actions">
      <button class="btn-call" onclick="handleCall()">📲 Müşteriyi Ara</button>
      <button class="btn-decline" onclick="closeIncoming()">✕ Vazgeç</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="hdr">
  <div class="hdr-brand">
    <div class="live-ring"></div>
    <h1>CRM Panel</h1>
  </div>
  <div class="hdr-right">
    <div class="conn-pill">
      <div class="conn-dot" id="connDot"></div>
      <span id="connTxt">Bağlanıyor</span>
    </div>
    <div class="user-btn" id="userBadge" onclick="document.getElementById('setupModal').classList.add('show')">👤 —</div>
  </div>
</div>

<div class="body">
  <div class="card caller-card">
    <div class="card-head">
      <span class="card-label">📞 Aranan Müşteri</span>
      <span class="tag tag-manual" id="srcTag">Bekleniyor</span>
    </div>
    <div class="card-body">
      <div id="phoneDisplay" class="phone-big empty">Bekleniyor...</div>
      <div class="manual-row">
        <input class="field-input" id="manualPhone" placeholder="Telefon numarasını girin veya yapıştırın..."
          oninput="onManualPhone(this.value)" onkeydown="if(event.key==='Enter')applyManual()"/>
        <button class="btn-paste" onclick="pasteClipboard()">📋 Yapıştır</button>
      </div>
      <div style="margin-top:8px;">
        <div class="field-label">Ad Soyad</div>
        <input class="field-input" id="nameInput" placeholder="Otomatik gelir veya buraya yazın"/>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><span class="card-label">📝 Not</span></div>
    <div class="card-body">
      <textarea id="noteInput" placeholder="Müşteri hakkında not ekleyin..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><span class="card-label">🏦 Banka Seçin</span></div>
    <div class="card-body">
      <div class="banks-grid" id="banksGrid"></div>
      <div class="sel-display" id="selDisplay"></div>
    </div>
  </div>

  <div class="div"></div>
  <button class="send-btn" id="sendBtn" onclick="sendToTeam()">📤 Ekibe Gönder</button>
</div>

<script>
const SUPABASE_URL = 'https://dxxmrtrsossnuwunctwn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_BlmcEWtLhWb4a-whlX1j1w_2RRLsSxI';

const BANKS = [
  'Ziraat Bankası','İş Bankası','Garanti BBVA','Yapı Kredi','Akbank',
  'Halkbank','VakıfBank','DenizBank','QNB Finansbank','TEB',
  'İNG Bank','HSBC Turkey','Şekerbank','Fibabanka','Burgan Bank',
  'Türkiye Finans','Kuveyt Türk','Ziraat Katılım','Vakıf Katılım','Halk Katılım',
  'Odeabank','Alternatif Bank','Anadolubank','ICBC Turkey','Bank of China TR'
];

let userId='', userName='', currentPhone='', incPhone='', selectedBanks=new Set();
let lastId=null, pollInterval=null;

window.addEventListener('DOMContentLoaded', ()=>{
  loadUser(); buildBanks(); parseUrlParams();
});

function loadUser(){
  userId=localStorage.getItem('crm_uid')||'';
  userName=localStorage.getItem('crm_name')||'';
  if(userId&&userName){
    document.getElementById('setupModal').classList.remove('show');
    document.getElementById('userBadge').textContent='👤 '+userName;
    startPolling();
  }
}

window.setupUser=()=>{
  const n=document.getElementById('setupName').value.trim();
  const i=document.getElementById('setupId').value.trim().replace(/\s+/g,'');
  if(!n||!i){showToast('Ad ve ID zorunlu','err');return;}
  userId=i;userName=n;
  localStorage.setItem('crm_uid',i);localStorage.setItem('crm_name',n);
  document.getElementById('userBadge').textContent='👤 '+n;
  document.getElementById('setupModal').classList.remove('show');
  startPolling();
  showToast('Hoş geldin, '+n+'!');
};

function buildBanks(){
  const g=document.getElementById('banksGrid');
  BANKS.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='bank-btn';btn.textContent=b;btn.title=b;
    btn.onclick=()=>{
      if(selectedBanks.has(b)){selectedBanks.delete(b);btn.classList.remove('sel');}
      else{selectedBanks.add(b);btn.classList.add('sel');}
      document.getElementById('selDisplay').textContent=selectedBanks.size?'✓ '+[...selectedBanks].join(' · '):'';
    };
    g.appendChild(btn);
  });
}

function parseUrlParams(){
  const p=new URLSearchParams(window.location.search);
  const phone=p.get('phone')||'', name=p.get('name')||'';
  if(phone) setPhone(phone,name,'auto');
}

function setPhone(phone,name,src){
  currentPhone=phone;
  const el=document.getElementById('phoneDisplay');
  if(phone){el.textContent=phone;el.className='phone-big';document.title='📞 '+phone;}
  else{el.textContent='Bekleniyor...';el.className='phone-big empty';document.title='CRM Panel';}
  if(name) document.getElementById('nameInput').value=name;
  document.getElementById('manualPhone').value=phone||'';
  const tag=document.getElementById('srcTag');
  tag.className=src==='auto'?'tag tag-auto':'tag tag-manual';
  tag.textContent=src==='auto'?'Otomatik':'Manuel';
}

window.onManualPhone=(v)=>{
  const c=v.replace(/[\s\-\(\)]/g,'');
  if(/^[\d\+]{7,}$/.test(c)) setPhone(c,'','manual');
};
window.applyManual=()=>{
  const v=document.getElementById('manualPhone').value.trim().replace(/[\s\-\(\)]/g,'');
  if(v) setPhone(v,'','manual');
};
window.pasteClipboard=async()=>{
  try{const t=await navigator.clipboard.readText();
    document.getElementById('manualPhone').value=t;onManualPhone(t);showToast('Yapıştırıldı');}
  catch(e){showToast('Pano izni gerekli','warn');}
};

// Polling ile bildirim dinle (her 3 saniyede)
async function startPolling(){
  if(pollInterval) clearInterval(pollInterval);
  await checkNotifications();
  pollInterval=setInterval(checkNotifications, 3000);
  document.getElementById('connDot').classList.add('on');
  document.getElementById('connTxt').textContent='Bağlı';
}

async function checkNotifications(){
  try{
    const res=await fetch(
      `${SUPABASE_URL}/rest/v1/crm_broadcast?order=id.desc&limit=1`,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}
    );
    if(!res.ok) return;
    const rows=await res.json();
    if(!rows.length) return;
    const row=rows[0];
    if(lastId===null){lastId=row.id;return;} // İlk yüklemede sadece ID kaydet
    if(row.id===lastId) return;
    if(row.from_id===userId){lastId=row.id;return;}
    const age=Date.now()-new Date(row.created_at).getTime();
    if(age>30000){lastId=row.id;return;}
    lastId=row.id;
    showIncoming(row);
  }catch(e){
    document.getElementById('connDot').classList.remove('on');
    document.getElementById('connTxt').textContent='Bağlanamadı';
  }
}

window.sendToTeam=async()=>{
  if(!currentPhone){showToast('Önce telefon numarası girin','err');return;}
  if(!userId){showToast('Kullanıcı adı gerekli','err');return;}
  const payload={
    from_name:userName||userId,
    from_id:userId,
    phone:currentPhone,
    name:document.getElementById('nameInput').value.trim()||currentPhone,
    banks:JSON.stringify([...selectedBanks]),
    note:document.getElementById('noteInput').value.trim()
  };
  const btn=document.getElementById('sendBtn');
  btn.disabled=true;btn.textContent='⏳ Gönderiliyor...';
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/crm_broadcast`,{
      method:'POST',
      headers:{
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,
        'Content-Type':'application/json',
        'Prefer':'return=minimal'
      },
      body:JSON.stringify(payload)
    });
    if(res.ok) showToast('✅ Ekibe gönderildi!');
    else showToast('Hata: '+res.status,'err');
  }catch(e){showToast('Bağlantı hatası','err');}
  btn.disabled=false;btn.innerHTML='📤 Ekibe Gönder';
};

function showIncoming(d){
  incPhone=d.phone||'';
  document.getElementById('incFrom').textContent=(d.from_name||'Ekip')+' yönlendirdi';
  document.getElementById('incName').textContent=d.name||'—';
  document.getElementById('incPhone').textContent=d.phone||'—';
  let banks=[];try{banks=JSON.parse(d.banks||'[]');}catch(e){}
  document.getElementById('incBanks').textContent=banks.length?'🏦 '+banks.join(' · '):'';
  document.getElementById('incNote').textContent=d.note||'Not yok';
  document.getElementById('incomingOverlay').classList.add('show');
  try{
    const ctx=new AudioContext();
    [0,.35,.7].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=880;
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(.25,ctx.currentTime+t+.05);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.25);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.3);
    });
  }catch(e){}
}
window.handleCall=()=>{
  if(!incPhone) return;
  window.location.href='tel:'+incPhone;
  closeIncoming();
};
window.closeIncoming=()=>{
  document.getElementById('incomingOverlay').classList.remove('show');
  incPhone='';
};

let toastTimer;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className='toast',3000);
}
window.showToast=showToast;

// URL polling
let lastTs='';
setInterval(()=>{
  const p=new URLSearchParams(window.location.search);
  const ts=p.get('ts')||'';
  if(ts!==lastTs){lastTs=ts;parseUrlParams();}
},800);
</script>
</body>
</html>
