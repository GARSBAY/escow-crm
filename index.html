<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f4f8;--s1:#fff;--s2:#f8fafc;--s3:#eef2f7;--border:#dde3ec;--border2:#c8d1de;--accent:#2563eb;--purple:#7c3aed;--green:#16a34a;--red:#dc2626;--yellow:#d97706;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;--shadow:0 1px 3px rgba(0,0,0,.08);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.hdr{position:sticky;top:0;z-index:50;background:var(--s1);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);}
.live{width:9px;height:9px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(22,163,74,.2)}50%{box-shadow:0 0 0 5px rgba(22,163,74,.05)}}
.hdr h1{font-size:14px;font-weight:700;margin-left:8px;}
.conn{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--s2);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text2);}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--red);}
.cdot.on{background:var(--green);}
.body{padding:12px;display:flex;flex-direction:column;gap:10px;max-width:460px;margin:0 auto;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.ch{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--s2);}
.cl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.cb{padding:13px 14px;}
.caller-card{border-top:3px solid var(--accent);}
.phone-big{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--accent);letter-spacing:.03em;min-height:34px;}
.phone-big.empty{color:var(--text3);font-size:15px;font-weight:400;font-family:var(--sans);}
.fi{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;width:100%;}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fi::placeholder{color:var(--text3);}
.fl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.mrow{display:flex;gap:6px;margin-top:10px;}
.mrow .fi{flex:1;}
.bpaste{padding:0 13px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500;}
.bpaste:hover{border-color:var(--accent);color:var(--accent);}
textarea{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 11px;color:var(--text);font-size:13px;line-height:1.5;resize:vertical;min-height:70px;width:100%;outline:none;transition:border-color .15s;}
textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.1);}
textarea::placeholder{color:var(--text3);}
.bg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.bb{padding:7px 5px;background:var(--s2);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;text-align:center;transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bb:hover{border-color:var(--purple);background:#f5f3ff;color:var(--purple);}
.bb.sel{background:#f5f3ff;border-color:var(--purple);color:var(--purple);font-weight:700;}
.bb.sel::before{content:'✓ ';}
.sd{margin-top:8px;font-size:11px;color:var(--purple);font-weight:600;line-height:1.5;}
.send-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s,transform .1s;box-shadow:0 4px 14px rgba(37,99,235,.3);}
.send-btn:hover{opacity:.92;transform:translateY(-1px);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
/* MESAJ */
.msg-box{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;line-height:1.5;resize:vertical;min-height:65px;width:100%;outline:none;transition:border-color .15s;}
.msg-box:focus{border-color:var(--accent);}
.msg-box::placeholder{color:var(--text3);}
.msg-bar{display:flex;gap:8px;margin-top:8px;align-items:center;}
.fbtn{padding:7px 12px;background:var(--s2);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;}
.fbtn:hover{border-color:var(--accent);color:var(--accent);}
.sbtn{padding:7px 16px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;margin-left:auto;}
.sbtn:hover{opacity:.85;}
.sbtn:disabled{opacity:.5;cursor:not-allowed;}
.flist{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.fitem{display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--s2);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--text2);}
.fitem button{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;line-height:1;}
.fimg{max-width:100%;max-height:100px;border-radius:5px;margin-top:4px;display:block;}
/* BİLDİRİMLER */
.nl{display:flex;flex-direction:column;gap:8px;}
.ni{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;}
.ni-top{display:flex;justify-content:space-between;margin-bottom:5px;}
.ni-phone{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--accent);}
.ni-name{font-size:13px;font-weight:600;}
.ni-from{font-size:10px;color:var(--text3);}
.ni-time{font-size:10px;color:var(--text3);}
.ni-banks{font-size:11px;color:var(--purple);font-weight:600;margin-top:3px;}
.ni-note{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5;}
.ni-note a{color:var(--accent);}
.ni-actions{display:flex;gap:6px;margin-top:8px;}
.ni-call{padding:5px 12px;background:var(--green);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;}
.ni-call:hover{opacity:.85;}
.nempty{font-size:12px;color:var(--text3);text-align:center;padding:16px 0;}
/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:900;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.show{display:flex;animation:fi .2s;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.inc{background:var(--s1);border:1px solid var(--accent);border-radius:18px;padding:28px 24px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:su .25s ease;}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.inc-ring{font-size:40px;margin-bottom:14px;display:inline-block;animation:ra .6s infinite alternate;}
@keyframes ra{from{transform:rotate(-12deg)}to{transform:rotate(12deg)}}
.inc-from{font-size:11px;color:var(--text3);margin-bottom:5px;}
.inc-name{font-size:20px;font-weight:700;margin-bottom:4px;}
.inc-phone{font-family:var(--mono);font-size:18px;color:var(--accent);margin-bottom:8px;font-weight:600;}
.inc-banks{font-size:12px;color:var(--purple);margin-bottom:6px;font-weight:600;}
.inc-note{font-size:12px;color:var(--text2);font-style:italic;margin-bottom:12px;background:var(--s2);padding:8px 12px;border-radius:8px;text-align:left;line-height:1.5;}
.inc-hint{font-size:10px;color:var(--text3);margin-bottom:16px;padding:6px 10px;background:var(--s2);border-radius:6px;line-height:1.5;}
.inc-acts{display:flex;gap:10px;}
.bcall{flex:1;padding:12px;background:var(--green);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;}
.bcall:hover{opacity:.85;}
.bdecline{flex:1;padding:12px;background:var(--s2);color:var(--text2);border:1px solid var(--border);border-radius:9px;font-size:13px;cursor:pointer;}
.bdecline:hover{border-color:var(--red);color:var(--red);}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--green);color:#fff;padding:10px 20px;border-radius:9px;font-size:12px;font-weight:600;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);}
.toast.warn{background:var(--yellow);}
.tag{font-size:9px;padding:3px 8px;border-radius:10px;border:1px solid;font-weight:700;}
.tag-auto{border-color:var(--green);color:var(--green);background:rgba(22,163,74,.08);}
.tag-manual{border-color:var(--yellow);color:var(--yellow);background:rgba(217,119,6,.08);}
.div{height:1px;background:var(--border);margin:2px 0;}
</style>
</head>
<body>

<!-- INCOMING -->
<div class="overlay" id="incomingOverlay">
  <div class="inc">
    <div class="inc-ring">📞</div>
    <div class="inc-from" id="incFrom"></div>
    <div class="inc-name" id="incName"></div>
    <div class="inc-phone" id="incPhone"></div>
    <div class="inc-banks" id="incBanks"></div>
    <div class="inc-note" id="incNote"></div>
    <div class="inc-hint">📲 Butona basınca MicroSIP/Zoiper açılır — aramayı siz başlatırsınız</div>
    <div class="inc-acts">
      <button class="bcall" id="callBtn">📲 Müşteriyi Ara</button>
      <button class="bdecline" id="declineBtn">✕ Vazgeç</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="hdr">
  <div style="display:flex;align-items:center">
    <div class="live"></div>
    <h1>CRM Panel</h1>
  </div>
  <div class="conn">
    <div class="cdot" id="cdot"></div>
    <span id="ctxt">Bağlanıyor</span>
  </div>
</div>

<div class="body">

  <!-- CALLER -->
  <div class="card caller-card">
    <div class="ch">
      <span class="cl">📞 Aranan Müşteri</span>
      <span class="tag tag-manual" id="stag">Bekleniyor</span>
    </div>
    <div class="cb">
      <div id="phoneDisplay" class="phone-big empty">Bekleniyor...</div>
      <div class="mrow">
        <input class="fi" id="manualPhone" placeholder="Telefon numarası girin..."/>
        <button class="bpaste" id="pasteBtn">📋 Yapıştır</button>
      </div>
      <div style="margin-top:10px">
        <div class="fl">Ad Soyad</div>
        <input class="fi" id="nameInput" placeholder="Otomatik gelir veya buraya yazın"/>
      </div>
    </div>
  </div>

  <!-- NOT -->
  <div class="card">
    <div class="ch"><span class="cl">📝 Not</span></div>
    <div class="cb">
      <textarea id="noteInput" placeholder="Müşteri hakkında not ekleyin..."></textarea>
    </div>
  </div>

  <!-- BANKALAR -->
  <div class="card">
    <div class="ch"><span class="cl">🏦 Banka Seçin</span></div>
    <div class="cb">
      <div class="bg" id="banksGrid"></div>
      <div class="sd" id="selDisplay"></div>
    </div>
  </div>

  <div class="div"></div>
  <button class="send-btn" id="sendBtn">📤 Ekibe Gönder</button>

  <!-- MESAJ & DOSYA -->
  <div class="card">
    <div class="ch"><span class="cl">💬 Mesaj & Dosya Gönder</span></div>
    <div class="cb">
      <textarea class="msg-box" id="msgArea" placeholder="Ekibe mesaj yazın..."></textarea>
      <div class="flist" id="fileList"></div>
      <div class="msg-bar">
        <button class="fbtn" id="fileBtn">📎 Dosya</button>
        <button class="fbtn" id="photoBtn">📷 Fotoğraf</button>
        <input type="file" id="fileInput" style="display:none" multiple/>
        <input type="file" id="photoInput" style="display:none" accept="image/*" multiple/>
        <button class="sbtn" id="msgSendBtn">📤 Gönder</button>
      </div>
    </div>
  </div>

  <!-- BİLDİRİMLER -->
  <div class="card">
    <div class="ch">
      <span class="cl">🔔 Gelen Bildirimler</span>
      <span style="font-size:10px;color:var(--text3);cursor:pointer;" id="clearBtn">Temizle</span>
    </div>
    <div class="cb">
      <div class="nl" id="notifList">
        <div class="nempty">Henüz bildirim yok</div>
      </div>
    </div>
  </div>

</div>

<script>
const SUPA_URL = 'https://dxxmrtrsossnuwunctwn.supabase.co';
const SUPA_KEY = 'sb_publishable_BlmcEWtLhWb4a-whlX1j1w_2RRLsSxI';
const IMGUR_ID = '546c25a59c58ad7';
const PANEL_URL = 'https://garsbay.github.io/escow-crm/index.html';

const BANKS = ['Ziraat Bankası','İş Bankası','Garanti BBVA','Yapı Kredi','Akbank','Halkbank','VakıfBank','DenizBank','QNB Finansbank','TEB','İNG Bank','HSBC Turkey','Şekerbank','Fibabanka','Burgan Bank','Türkiye Finans','Kuveyt Türk','Ziraat Katılım','Vakıf Katılım','Halk Katılım','Odeabank','Alternatif Bank','Anadolubank','ICBC Turkey','Bank of China TR'];

let userId = localStorage.getItem('crm_uid') || ('u_' + Math.random().toString(36).slice(2,7));
let userName = localStorage.getItem('crm_name') || userId;
localStorage.setItem('crm_uid', userId); localStorage.setItem('crm_name', userName);

let currentPhone = '', incPhone = '', lastId = null;
let selectedBanks = new Set();
let attachedFiles = [];

// INIT
document.addEventListener('DOMContentLoaded', function() {
  buildBanks();
  parseUrl();
  startPolling();
  bindEvents();
});

function bindEvents() {
  // Phone input
  document.getElementById('manualPhone').addEventListener('input', function() {
    applyPhone(this.value);
  });
  document.getElementById('manualPhone').addEventListener('keydown', function(e) {
    if(e.key === 'Enter') applyPhone(this.value);
  });

  // Paste button
  document.getElementById('pasteBtn').addEventListener('click', async function() {
    try {
      const t = await navigator.clipboard.readText();
      document.getElementById('manualPhone').value = t;
      applyPhone(t);
      toast('Yapıştırıldı');
    } catch(e) { toast('Pano izni gerekli','warn'); }
  });

  // Send to team
  document.getElementById('sendBtn').addEventListener('click', sendToTeam);

  // Message send
  document.getElementById('msgSendBtn').addEventListener('click', sendMessage);

  // File buttons
  document.getElementById('fileBtn').addEventListener('click', function() {
    document.getElementById('fileInput').click();
  });
  document.getElementById('photoBtn').addEventListener('click', function() {
    document.getElementById('photoInput').click();
  });
  document.getElementById('fileInput').addEventListener('change', function() {
    addFiles(this.files);
  });
  document.getElementById('photoInput').addEventListener('change', function() {
    addFiles(this.files);
  });

  // Clear notifications
  document.getElementById('clearBtn').addEventListener('click', function() {
    document.getElementById('notifList').innerHTML = '<div class="nempty">Henüz bildirim yok</div>';
  });

  // Incoming overlay buttons
  document.getElementById('callBtn').addEventListener('click', function() {
    if(incPhone) window.location.href = 'tel:' + incPhone;
    document.getElementById('incomingOverlay').classList.remove('show');
    incPhone = '';
  });
  document.getElementById('declineBtn').addEventListener('click', function() {
    document.getElementById('incomingOverlay').classList.remove('show');
    incPhone = '';
  });
}

// BANKS
function buildBanks() {
  const g = document.getElementById('banksGrid');
  BANKS.forEach(function(b) {
    const btn = document.createElement('button');
    btn.className = 'bb'; btn.textContent = b; btn.title = b;
    btn.addEventListener('click', function() {
      if(selectedBanks.has(b)) { selectedBanks.delete(b); btn.classList.remove('sel'); }
      else { selectedBanks.add(b); btn.classList.add('sel'); }
      document.getElementById('selDisplay').textContent = selectedBanks.size ? '✓ ' + Array.from(selectedBanks).join(' · ') : '';
    });
    g.appendChild(btn);
  });
}

// PHONE
function parseUrl() {
  const p = new URLSearchParams(window.location.search);
  const ph = p.get('phone') || '', nm = p.get('name') || '';
  if(ph) setPhone(ph, nm, 'auto');
}

function applyPhone(v) {
  let c = v.replace(/[\s\-\(\)]/g, '');
  if(!c) return;
  if(!c.startsWith('+') && !c.startsWith('0090')) {
    if(c.startsWith('5') && c.length === 10) c = '+90' + c;
    else if(c.startsWith('0') && c.length === 11) c = '+90' + c.slice(1);
    else if(c.startsWith('90') && c.length === 12) c = '+' + c;
  }
  if(/^[\d\+]{7,}$/.test(c)) {
    setPhone(c, '', 'manual');
    document.getElementById('manualPhone').value = c;
  }
}

function setPhone(phone, name, src) {
  currentPhone = phone;
  const el = document.getElementById('phoneDisplay');
  if(phone) { el.textContent = phone; el.className = 'phone-big'; document.title = '📞 ' + phone; }
  else { el.textContent = 'Bekleniyor...'; el.className = 'phone-big empty'; document.title = 'CRM Panel'; }
  if(name) document.getElementById('nameInput').value = name;
  document.getElementById('manualPhone').value = phone || '';
  const tag = document.getElementById('stag');
  tag.className = src === 'auto' ? 'tag tag-auto' : 'tag tag-manual';
  tag.textContent = src === 'auto' ? 'Otomatik' : 'Manuel';
}

// SUPABASE POLLING
async function startPolling() {
  await checkNotifs();
  setInterval(checkNotifs, 3000);
}

async function checkNotifs() {
  try {
    const r = await fetch(SUPA_URL + '/rest/v1/crm_broadcast?order=id.desc&limit=1', {
      headers: {'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY}
    });
    if(!r.ok) return;
    const rows = await r.json();
    document.getElementById('cdot').classList.add('on');
    document.getElementById('ctxt').textContent = 'Bağlı';
    if(!rows.length) return;
    const row = rows[0];
    if(lastId === null) { lastId = row.id; return; }
    if(row.id === lastId) return;
    if(row.from_id === userId) { lastId = row.id; return; }
    if(Date.now() - new Date(row.created_at).getTime() > 30000) { lastId = row.id; return; }
    lastId = row.id;
    showIncoming(row);
    addToHistory(row);
  } catch(e) {
    document.getElementById('cdot').classList.remove('on');
    document.getElementById('ctxt').textContent = 'Bağlanamadı';
  }
}

// SEND TO TEAM
async function sendToTeam() {
  if(!currentPhone) { toast('Önce telefon numarası girin', 'err'); return; }
  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = '⏳ Gönderiliyor...';
  try {
    const r = await fetch(SUPA_URL + '/rest/v1/crm_broadcast', {
      method: 'POST',
      headers: {'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
      body: JSON.stringify({
        from_name: userName, from_id: userId, phone: currentPhone,
        name: document.getElementById('nameInput').value.trim() || currentPhone,
        banks: JSON.stringify(Array.from(selectedBanks)),
        note: document.getElementById('noteInput').value.trim()
      })
    });
    if(r.ok) toast('✅ Ekibe gönderildi!');
    else toast('Hata: ' + r.status, 'err');
  } catch(e) { toast('Bağlantı hatası', 'err'); }
  btn.disabled = false; btn.innerHTML = '📤 Ekibe Gönder';
}

// FILES
function addFiles(files) {
  const list = document.getElementById('fileList');
  Array.from(files).forEach(function(file) {
    const idx = attachedFiles.length;
    attachedFiles.push(file);
    const item = document.createElement('div');
    item.className = 'fitem';
    item.dataset.idx = idx;
    if(file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = function(e) {
        item.innerHTML = '<img class="fimg" src="' + e.target.result + '"/><span>' + file.name + '</span><button onclick="removeFile(' + idx + ')">✕</button>';
      };
      reader.readAsDataURL(file);
    } else {
      item.innerHTML = '<span>📎 ' + file.name + '</span><button onclick="removeFile(' + idx + ')">✕</button>';
    }
    list.appendChild(item);
  });
}

function removeFile(idx) {
  attachedFiles[idx] = null;
  const items = document.getElementById('fileList').querySelectorAll('.fitem');
  items.forEach(function(item) {
    if(parseInt(item.dataset.idx) === idx) item.remove();
  });
}

// IMGBB UPLOAD (imgur yedeği)
async function uploadImgur(file) {
  const base64 = await new Promise(function(res) {
    const r = new FileReader();
    r.onload = function(e) { res(e.target.result.split(',')[1]); };
    r.readAsDataURL(file);
  });
  // imgbb.com - ücretsiz ve stabil
  const form = new FormData();
  form.append('image', base64);
  const resp = await fetch('https://api.imgbb.com/1/upload?key=2e48e99e9b675d7ce9a6b9f8b8e2c4a1', {
    method: 'POST',
    body: form
  });
  const data = await resp.json();
  if(data.success) return data.data.url;
  // Imgur fallback
  const resp2 = await fetch('https://api.imgur.com/3/image', {
    method: 'POST',
    headers: {'Authorization': 'Client-ID 546c25a59c58ad7', 'Content-Type': 'application/json'},
    body: JSON.stringify({image: base64, type: 'base64'})
  });
  const data2 = await resp2.json();
  if(data2.success) return data2.data.link;
  throw new Error('Resim yüklenemedi');
}

// SEND MESSAGE
async function sendMessage() {
  const msg = document.getElementById('msgArea').value.trim();
  const files = attachedFiles.filter(function(f) { return f !== null; });
  if(!msg && files.length === 0) { toast('Mesaj veya dosya ekleyin', 'err'); return; }

  const btn = document.getElementById('msgSendBtn');
  btn.disabled = true; btn.textContent = '⏳';

  const lines = [];
  if(msg) lines.push(msg);

  for(let i = 0; i < files.length; i++) {
    const file = files[i];
    try {
      if(file.type.startsWith('image/')) {
        toast('Resim yükleniyor ' + (i+1) + '/' + files.length + '...');
        const link = await uploadImgur(file);
        lines.push('🖼 ' + file.name + ': ' + link);
      } else {
        lines.push('📎 ' + file.name);
      }
    } catch(e) {
      lines.push('❌ ' + file.name + ' yüklenemedi');
    }
  }

  try {
    const r = await fetch(SUPA_URL + '/rest/v1/crm_broadcast', {
      method: 'POST',
      headers: {'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
      body: JSON.stringify({
        from_name: userName, from_id: userId,
        phone: currentPhone || '', name: '',
        banks: JSON.stringify([]),
        note: lines.join('\n')
      })
    });
    if(r.ok) {
      toast('✅ Mesaj gönderildi!');
      document.getElementById('msgArea').value = '';
      document.getElementById('fileList').innerHTML = '';
      attachedFiles = [];
    } else { toast('Hata: ' + r.status, 'err'); }
  } catch(e) { toast('Bağlantı hatası', 'err'); }

  btn.disabled = false; btn.textContent = '📤 Gönder';
}

// INCOMING OVERLAY
function showIncoming(d) {
  incPhone = d.phone || '';
  document.getElementById('incFrom').textContent = (d.from_name || 'Ekip') + ' yönlendirdi';
  document.getElementById('incName').textContent = d.name || '—';
  document.getElementById('incPhone').textContent = d.phone || '—';
  let banks = []; try { banks = JSON.parse(d.banks || '[]'); } catch(e) {}
  document.getElementById('incBanks').textContent = banks.length ? '🏦 ' + banks.join(' · ') : '';
  document.getElementById('incNote').innerHTML = formatNote(d.note || 'Not yok');
  document.getElementById('incomingOverlay').classList.add('show');
  // Ses
  try {
    const ctx = new AudioContext();
    [0, .35, .7].forEach(function(t) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.frequency.value = 880;
      g.gain.setValueAtTime(0, ctx.currentTime + t);
      g.gain.linearRampToValueAtTime(.3, ctx.currentTime + t + .05);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .3);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .35);
    });
  } catch(e) {}
}

// HISTORY
function addToHistory(d) {
  let banks = []; try { banks = JSON.parse(d.banks || '[]'); } catch(e) {}
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const phone = d.phone || '';
  const item = document.createElement('div');
  item.className = 'ni';
  item.innerHTML =
    '<div class="ni-top">' +
      '<div><div class="ni-name">' + (d.name||'—') + '</div><div class="ni-phone">' + phone + '</div></div>' +
      '<div style="text-align:right"><div class="ni-time">' + time + '</div><div class="ni-from">' + (d.from_name||'Ekip') + '</div></div>' +
    '</div>' +
    (banks.length ? '<div class="ni-banks">🏦 ' + banks.join(' · ') + '</div>' : '') +
    (d.note ? '<div class="ni-note">' + formatNote(d.note) + '</div>' : '') +
    '<div class="ni-actions">' +
      (phone ? '<button class="ni-call" onclick="window.location.href=\'tel:' + phone + '\'">📲 Ara</button>' : '') +
    '</div>';
  const list = document.getElementById('notifList');
  const empty = list.querySelector('.nempty');
  if(empty) empty.remove();
  list.insertBefore(item, list.firstChild);
  while(list.children.length > 20) list.removeChild(list.lastChild);
}

function formatNote(note) {
  if(!note) return '';
  return note
    .replace(/https?:\/\/i\.imgur\.com\/\S+/g, function(url) {
      return '<a href="' + url + '" target="_blank">🖼 Resmi Gör</a>';
    })
    .replace(/\n/g, '<br>');
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function() { t.className = 'toast'; }, 3000);
}

// URL polling
let lastTs = '';
setInterval(function() {
  const p = new URLSearchParams(window.location.search);
  const ts = p.get('ts') || '';
  if(ts !== lastTs) { lastTs = ts; parseUrl(); }
}, 800);
</script>
